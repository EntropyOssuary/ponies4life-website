<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enter — PONIES4.LIFE</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    background: #050005;
    background-image: radial-gradient(ellipse at 50% 30%, rgba(30,0,40,0.9) 0%, #050005 70%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .gate-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    text-align: center;
  }
  .gate-text-above {
    font-family: "Georgia", serif;
    color: #888;
    font-size: 0.85em;
    letter-spacing: 3px;
    margin-bottom: 20px;
    font-style: italic;
  }
  .enter-btn {
    background: #0a0a0a;
    border: 2px solid #666;
    color: #999;
    font-family: "Georgia", serif;
    font-size: 1.2em;
    letter-spacing: 5px;
    padding: 14px 40px;
    cursor: pointer;
    margin-top: 30px;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .enter-btn:hover {
    border-color: #aaa;
    color: #eee;
    box-shadow: 0 0 20px rgba(200,200,200,0.2);
  }
  .gate-text-below {
    font-family: "Georgia", serif;
    color: #444;
    font-size: 0.7em;
    margin-top: 20px;
    letter-spacing: 2px;
  }
  @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.8} 94%{opacity:1} 97%{opacity:0.9} }
  .flicker { animation: flicker 5s infinite; }
</style>
</head>
<body>

<!-- Autoplay popup -->
<div id="autoplay-overlay" class="win95-overlay">
  <div class="win95-popup">
    <div class="win95-titlebar">
      <span>ponies4.life</span>
      <button class="win95-close" disabled>✕</button>
    </div>
    <div class="win95-body">
      <p>For the full experience, enable autoplay.</p>
      <button id="popup-ok" class="win95-ok">OK</button>
    </div>
  </div>
</div>
<div id="yt-player" style="position:fixed;top:-400px;left:-400px;width:320px;height:180px;pointer-events:none"></div>

<div class="gate-page">
  <p class="gate-text-above flicker">ponies4.life</p>

  <!-- Wrought Iron Gate SVG -->
  <svg width="320" height="280" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg" class="flicker">
    <defs>
      <linearGradient id="ironGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#888;stop-opacity:1"/>
        <stop offset="40%" style="stop-color:#444;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#222;stop-opacity:1"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Ground/posts -->
    <rect x="10" y="30" width="12" height="240" fill="url(#ironGrad)" rx="2"/>
    <rect x="298" y="30" width="12" height="240" fill="url(#ironGrad)" rx="2"/>
    <!-- Post caps -->
    <ellipse cx="16" cy="30" rx="8" ry="12" fill="#666"/>
    <ellipse cx="304" cy="30" rx="8" ry="12" fill="#666"/>
    <polygon points="16,18 10,30 22,30" fill="#888"/>
    <polygon points="304,18 298,30 310,30" fill="#888"/>

    <!-- Top arch -->
    <path d="M22,80 Q160,10 298,80" stroke="url(#ironGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Arch scrollwork -->
    <path d="M100,55 Q120,35 140,55" stroke="#666" stroke-width="3" fill="none"/>
    <path d="M180,55 Q200,35 220,55" stroke="#666" stroke-width="3" fill="none"/>
    <!-- Center ornament on arch -->
    <circle cx="160" cy="36" r="10" fill="#333" stroke="#888" stroke-width="2"/>
    <path d="M155,36 L165,36 M160,31 L160,41" stroke="#aaa" stroke-width="1.5"/>

    <!-- Left gate half — bars -->
    <g fill="url(#ironGrad)" stroke="#555" stroke-width="0.5">
      <!-- horizontal rails left -->
      <rect x="22" y="80" width="130" height="8" rx="2"/>
      <rect x="22" y="160" width="130" height="6" rx="2"/>
      <rect x="22" y="230" width="130" height="6" rx="2"/>
      <!-- vertical bars left -->
      <rect x="28" y="80" width="7" height="160"/>
      <rect x="46" y="80" width="7" height="160"/>
      <rect x="64" y="80" width="7" height="160"/>
      <rect x="82" y="80" width="7" height="160"/>
      <rect x="100" y="80" width="7" height="160"/>
      <rect x="118" y="80" width="7" height="160"/>
      <rect x="136" y="80" width="7" height="160"/>
    </g>
    <!-- Spear finials left -->
    <g fill="#999">
      <polygon points="31,80 34.5,64 38,80"/>
      <polygon points="49,80 52.5,64 56,80"/>
      <polygon points="67,80 70.5,64 74,80"/>
      <polygon points="85,80 88.5,64 92,80"/>
      <polygon points="103,80 106.5,64 110,80"/>
      <polygon points="121,80 124.5,64 128,80"/>
      <polygon points="139,80 142.5,64 146,80"/>
    </g>

    <!-- Right gate half — bars -->
    <g fill="url(#ironGrad)" stroke="#555" stroke-width="0.5">
      <!-- horizontal rails right -->
      <rect x="168" y="80" width="130" height="8" rx="2"/>
      <rect x="168" y="160" width="130" height="6" rx="2"/>
      <rect x="168" y="230" width="130" height="6" rx="2"/>
      <!-- vertical bars right -->
      <rect x="168" y="80" width="7" height="160"/>
      <rect x="186" y="80" width="7" height="160"/>
      <rect x="204" y="80" width="7" height="160"/>
      <rect x="222" y="80" width="7" height="160"/>
      <rect x="240" y="80" width="7" height="160"/>
      <rect x="258" y="80" width="7" height="160"/>
      <rect x="276" y="80" width="7" height="160"/>
    </g>
    <!-- Spear finials right -->
    <g fill="#999">
      <polygon points="171,80 174.5,64 178,80"/>
      <polygon points="189,80 192.5,64 196,80"/>
      <polygon points="207,80 210.5,64 214,80"/>
      <polygon points="225,80 228.5,64 232,80"/>
      <polygon points="243,80 246.5,64 250,80"/>
      <polygon points="261,80 264.5,64 268,80"/>
      <polygon points="279,80 282.5,64 286,80"/>
    </g>

    <!-- Scrollwork on gate halves -->
    <path d="M155,130 Q148,120 145,130 Q148,140 155,130Z" stroke="#666" stroke-width="1.5" fill="none"/>
    <path d="M165,130 Q172,120 175,130 Q172,140 165,130Z" stroke="#666" stroke-width="1.5" fill="none"/>

    <!-- Gate ground line -->
    <rect x="10" y="240" width="300" height="6" fill="#333" rx="1"/>
    <rect x="0"  y="246" width="320" height="4" fill="#222" rx="1"/>

    <!-- Grass texture -->
    <g stroke="#1a3a1a" stroke-width="1.5" opacity="0.6">
      <line x1="30" y1="250" x2="28" y2="265"/>
      <line x1="30" y1="250" x2="32" y2="265"/>
      <line x1="60" y1="250" x2="58" y2="263"/>
      <line x1="60" y1="250" x2="62" y2="263"/>
      <line x1="100" y1="250" x2="97" y2="266"/>
      <line x1="100" y1="250" x2="103" y2="266"/>
      <line x1="150" y1="250" x2="148" y2="264"/>
      <line x1="150" y1="250" x2="152" y2="264"/>
      <line x1="200" y1="250" x2="197" y2="265"/>
      <line x1="200" y1="250" x2="203" y2="265"/>
      <line x1="250" y1="250" x2="248" y2="264"/>
      <line x1="250" y1="250" x2="252" y2="264"/>
      <line x1="290" y1="250" x2="288" y2="263"/>
      <line x1="290" y1="250" x2="292" y2="263"/>
    </g>
  </svg>

  <button class="enter-btn" onclick="enterGarden()">E N T E R</button>
  <p class="gate-text-below">The Heart Horse Memorial Garden</p>
</div>

<script src="js/main.js"></script>
<script>
initAutoplay('dfXqxjMkyQ4'); // Cemetery Gates — The Smiths

function enterGarden() {
  sessionStorage.setItem('gardenAutoplay', '1');
  window.location.href = 'memorial-garden.html';
}
</script>
</body>
</html>
