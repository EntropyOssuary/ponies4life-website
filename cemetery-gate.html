<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enter — PONIES4.LIFE</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    background: #050005;
    background-image: radial-gradient(ellipse at 50% 30%, rgba(30,0,40,0.9) 0%, #050005 70%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .gate-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    text-align: center;
  }
  .gate-text-above {
    font-family: "Georgia", serif;
    color: #888;
    font-size: 0.85em;
    letter-spacing: 3px;
    margin-bottom: 20px;
    font-style: italic;
  }
  .enter-btn {
    background: #0a0a0a;
    border: 2px solid #666;
    color: #999;
    font-family: "Georgia", serif;
    font-size: 1.2em;
    letter-spacing: 5px;
    padding: 14px 40px;
    cursor: pointer;
    margin-top: 30px;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .enter-btn:hover {
    border-color: #aaa;
    color: #eee;
    box-shadow: 0 0 20px rgba(200,200,200,0.2);
  }
  .gate-text-below {
    font-family: "Georgia", serif;
    color: #aaa;
    font-size: 1.3em;
    margin-top: 16px;
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(180,150,220,0.4);
  }
  @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.8} 94%{opacity:1} 97%{opacity:0.9} }
  .flicker { animation: flicker 5s infinite; }
</style>
</head>
<body>

<!-- Autoplay popup -->
<div id="autoplay-overlay" class="win95-overlay">
  <div class="win95-popup">
    <div class="win95-titlebar">
      <span>ponies4.life</span>
      <button class="win95-close" disabled>✕</button>
    </div>
    <div class="win95-body">
      <p>For the full experience, enable autoplay.</p>
      <button id="popup-ok" class="win95-ok">OK</button>
    </div>
  </div>
</div>
<div id="yt-player" style="position:fixed;top:-400px;left:-400px;width:320px;height:180px;pointer-events:none"></div>

<div class="gate-page">
  <p class="gate-text-above flicker">ponies4.life</p>

  <img src="cemetery-gate-1.png" alt="Cemetery Gate" style="width:min(480px,90vw);filter:invert(1) brightness(0.82);display:block;margin:0 auto;" class="flicker">

  <button class="enter-btn" onclick="enterGarden()">E N T E R</button>
  <p class="gate-text-below">The Heart Horse Memorial Garden</p>
</div>

<script src="js/main.js"></script>
<script>
initAutoplay('dfXqxjMkyQ4'); // Cemetery Gates — The Smiths

function enterGarden() {
  sessionStorage.setItem('gardenAutoplay', '1');
  window.location.href = 'memorial-garden.html';
}
</script>
</body>
</html>
